services:
  - type: web
    name: tht-email-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 dashboard.py
    envVars:
      - key: PORT
        value: "10000"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SMARTLEAD_API_KEY
        sync: false
      - key: SMARTLEAD_JWT
        sync: false
      - key: SMARTLEAD_GQL
        sync: false
      - key: ZAPMAIL_API_KEY
        sync: false
      - key: ZAPMAIL_EMAIL
        sync: false
      - key: ZAPMAIL_PASSWORD
        sync: false
      - key: PORKBUN_API_KEY
        sync: false
      - key: PORKBUN_SECRET_KEY
        sync: false
      - key: SPACESHIP_API_KEY
        sync: false
      - key: SPACESHIP_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: MARSHA_SLACK_CHANNEL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: CRM_SUPABASE_URL
        sync: false
      - key: CRM_SUPABASE_KEY
        sync: false
