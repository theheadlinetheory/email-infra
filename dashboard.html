<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THT Infrastructure Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

.topbar { background: #16213e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
.topbar h1 { font-size: 20px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #888; }
.topbar-right button { background: #0f3460; color: #eee; border: 1px solid #1a5276; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.topbar-right button:hover { background: #1a5276; }

.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

.alert-banner { background: #5c1a1a; border: 1px solid #8b3a3a; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
.alert-banner h3 { color: #ff6b6b; font-size: 14px; margin-bottom: 8px; }
.alert-banner .alert-item { font-size: 13px; color: #ffaaaa; padding: 2px 0; }

.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
.stat-card.alert .value { color: #ff6b6b; }
.stat-card.good .value { color: #4ecdc4; }
.stat-card.warn .value { color: #ffd93d; }

h2.section-title { font-size: 16px; font-weight: 600; color: #aaa; margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 1px; }

.clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.client-card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 16px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
.client-card:hover { border-color: #1a5276; transform: translateY(-1px); }
.client-card.has-alert { border-left: 3px solid #ff6b6b; }
.client-card .cc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.client-card .cc-name { font-size: 16px; font-weight: 600; }
.client-card .cc-count { font-size: 13px; color: #888; }
.client-card .cc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; }
.client-card .cc-stat { display: flex; justify-content: space-between; padding: 3px 0; }
.client-card .cc-stat .label { color: #888; }
.client-card .cc-dates { margin-top: 10px; padding-top: 10px; border-top: 1px solid #0f3460; font-size: 12px; color: #888; }
.client-card .cc-dates .date-row { display: flex; justify-content: space-between; padding: 2px 0; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: #1a4a3a; color: #4ecdc4; }
.badge-yellow { background: #4a3a1a; color: #ffd93d; }
.badge-red { background: #4a1a1a; color: #ff6b6b; }

.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; }
.detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 900px; max-width: 95vw; background: #16213e; z-index: 101; overflow-y: auto; padding: 24px; border-left: 1px solid #0f3460; }
.detail-panel .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
.detail-panel h2 { font-size: 20px; margin-bottom: 16px; }
.detail-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
.detail-panel th { text-align: left; padding: 8px; color: #888; border-bottom: 1px solid #0f3460; font-weight: 500; }
.detail-panel td { padding: 8px; border-bottom: 1px solid #0a1628; }
.detail-panel tr:hover td { background: #1a2744; }

.unassigned-section { margin-top: 32px; }
.assign-controls { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
.assign-controls select { background: #0a1628; color: #eee; border: 1px solid #0f3460; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.assign-controls button { background: #0f3460; color: #eee; border: 1px solid #1a5276; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.assign-controls button:hover { background: #1a5276; }
.assign-controls button:disabled { opacity: 0.5; cursor: not-allowed; }

.unassigned-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
.unassigned-table th { text-align: left; padding: 8px; color: #888; border-bottom: 1px solid #0f3460; }
.unassigned-table td { padding: 8px; border-bottom: 1px solid #0a1628; }
.unassigned-table tr:hover td { background: #1a2744; }
.unassigned-table input[type="checkbox"] { accent-color: #4ecdc4; }

.loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }
.loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #333; border-top-color: #4ecdc4; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #0f3460; }
.tab { padding: 10px 24px; cursor: pointer; color: #888; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
.tab:hover { color: #ccc; }
.tab.active { color: #4ecdc4; border-bottom-color: #4ecdc4; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.zm-client-card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.zm-client-card.has-renewal { border-left: 3px solid #ff6b6b; }
.zm-client-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
.zm-client-header h3 { font-size: 16px; font-weight: 600; }
.zm-client-header .zm-meta { font-size: 13px; color: #888; }
.zm-domain-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
.zm-domain-table th { text-align: left; padding: 6px 8px; color: #888; border-bottom: 1px solid #0f3460; }
.zm-domain-table td { padding: 6px 8px; border-bottom: 1px solid #0a1628; }
.zm-domain-table tr:hover td { background: #1a2744; }
.zm-domain-table input[type="checkbox"] { accent-color: #ff6b6b; }

.cancel-controls { display: flex; gap: 12px; align-items: center; margin: 8px 0; }
.cancel-btn { background: #5c1a1a; color: #ff6b6b; border: 1px solid #8b3a3a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.cancel-btn:hover { background: #8b3a3a; }
.cancel-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.sync-section { margin-top: 24px; }
.sync-item { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; }
.sync-item .mismatch { color: #ffd93d; }
.sync-item .domain { color: #4ecdc4; }
</style>
</head>
<body>

<div class="topbar">
    <h1>THT Infrastructure Dashboard</h1>
    <div class="topbar-right">
        <span id="wallet-balance" style="color:#4ecdc4;font-weight:600;"></span>
        <span id="pipeline-badge" style="display:none;background:#7c4dff;color:#fff;padding:2px 8px;border-radius:10px;font-size:12px;"></span>
        <span id="last-updated"></span>
        <button onclick="loadOverview()">Refresh</button>
    </div>
</div>

<div class="container">
    <div id="loading" class="loading">
        <span class="spinner"></span> Loading infrastructure data...
    </div>

    <div id="content" style="display:none;">
        <div id="alert-banner"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('smartlead')">SmartLead</div>
            <div class="tab" onclick="switchTab('zapmail')">ZapMail</div>
            <div class="tab" onclick="switchTab('domains')">Domains</div>
            <div class="tab" onclick="switchTab('pipelines')">Pipelines</div>
            <div class="tab" onclick="switchTab('sync')">Sync Check</div>
        </div>

        <!-- SmartLead Tab -->
        <div id="tab-smartlead" class="tab-content active">
            <div style="display:flex;gap:12px;margin-bottom:16px;">
                <button onclick="showNewClientForm()" style="background:#0f3460;color:#eee;border:1px solid #1a5276;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;">+ New Client Setup</button>
                <span id="inventory-alert" style="display:none;color:#ffd93d;font-size:13px;padding:10px 0;"></span>
            </div>
            <div class="summary-row" id="summary-row"></div>

            <h2 class="section-title">Clients</h2>
            <div class="clients-grid" id="clients-grid"></div>

            <div class="unassigned-section" id="unassigned-section" style="display:none;">
                <h2 class="section-title">Unassigned Accounts</h2>
                <div class="assign-controls">
                    <select id="assign-client-select">
                        <option value="">-- Assign to client --</option>
                    </select>
                    <button id="assign-btn" onclick="assignSelected()" disabled>Assign Selected</button>
                    <span id="assign-status"></span>
                </div>
                <table class="unassigned-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                            <th>Email</th>
                            <th>Domain</th>
                            <th>Warmup</th>
                            <th>Reputation</th>
                            <th>SMTP</th>
                        </tr>
                    </thead>
                    <tbody id="unassigned-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ZapMail Tab -->
        <div id="tab-zapmail" class="tab-content">
            <div class="summary-row" id="zm-summary-row"></div>
            <div id="zm-clients"></div>
        </div>

        <!-- Domains Tab -->
        <div id="tab-domains" class="tab-content">
            <div class="summary-row" id="dom-summary-row"></div>
            <div id="dom-alerts"></div>
            <div id="dom-content"></div>
        </div>

        <!-- Pipelines Tab -->
        <div id="tab-pipelines" class="tab-content">
            <div id="pipelines-loading" class="loading" style="display:none;">
                <span class="spinner"></span> Loading pipelines...
            </div>
            <div id="pipelines-content"></div>
        </div>

        <!-- Sync Tab -->
        <div id="tab-sync" class="tab-content">
            <div id="sync-loading" class="loading" style="display:none;">
                <span class="spinner"></span> Checking sync between ZapMail and SmartLead...
            </div>
            <div id="sync-content"></div>
        </div>
    </div>
</div>

<div id="new-client-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;" onclick="closeNewClientForm()"></div>
<div id="new-client-form" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:32px;z-index:201;width:500px;max-width:90vw;">
    <h2 style="margin-bottom:20px;">New Client Setup</h2>
    <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:4px;">Client Name</label>
        <input id="nc-client-name" type="text" style="width:100%;padding:8px 12px;background:#0a1628;color:#eee;border:1px solid #0f3460;border-radius:6px;font-size:14px;">
    </div>
    <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:4px;">Number of Domains</label>
        <input id="nc-domain-count" type="number" min="1" max="50" value="5" style="width:100%;padding:8px 12px;background:#0a1628;color:#eee;border:1px solid #0f3460;border-radius:6px;font-size:14px;">
    </div>
    <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:4px;">Forwarding URL</label>
        <input id="nc-forwarding" type="text" placeholder="https://..." style="width:100%;padding:8px 12px;background:#0a1628;color:#eee;border:1px solid #0f3460;border-radius:6px;font-size:14px;">
    </div>
    <div id="nc-inventory" style="font-size:13px;color:#888;margin-bottom:16px;"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button onclick="closeNewClientForm()" style="background:none;color:#888;border:1px solid #0f3460;padding:8px 18px;border-radius:6px;cursor:pointer;">Cancel</button>
        <button id="nc-start-btn" onclick="startNewClientPipeline()" style="background:#4ecdc4;color:#1a1a2e;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-weight:600;">Start Setup</button>
    </div>
    <div id="nc-status" style="margin-top:12px;font-size:13px;"></div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel" style="display:none;">
    <button class="close-btn" onclick="closeDetail()">&times;</button>
    <h2 id="detail-title"></h2>
    <div id="detail-content"></div>
</div>

<script>
let overviewData = null;
let clientsList = [];

async function loadOverview() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').style.display = 'none';

    try {
        const resp = await fetch('/api/overview');
        const text = await resp.text();
        try {
            overviewData = JSON.parse(text);
        } catch (parseErr) {
            document.getElementById('loading').innerHTML = 'Error parsing response: ' + text.substring(0, 500);
            return;
        }
        if (overviewData.error) {
            document.getElementById('loading').innerHTML = '<div style="text-align:left;max-width:800px;margin:0 auto;"><h3 style="color:#ff6b6b;">API Error</h3><pre style="white-space:pre-wrap;color:#ffaaaa;font-size:12px;">' + overviewData.traceback + '</pre></div>';
            return;
        }
        renderOverview();
        loadUnassigned();
    } catch (err) {
        document.getElementById('loading').innerHTML = 'Error loading data: ' + err.message;
    }
}

function renderOverview() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const d = overviewData;
    const time = new Date(d.generated_at).toLocaleTimeString();
    document.getElementById('last-updated').textContent = 'Updated: ' + time;

    // Alert banner
    const alertEl = document.getElementById('alert-banner');
    const attentionClients = d.clients.filter(c => c.needs_attention);
    if (d.blocked_accounts.length > 0 || d.smtp_failures > 0 || attentionClients.length > 0) {
        let html = '<div class="alert-banner"><h3>Alerts</h3>';
        if (attentionClients.length > 0) {
            html += '<div class="alert-item" style="font-size:14px;margin-bottom:6px;">' + attentionClients.length + ' client(s) have infrastructure that needs attention</div>';
            attentionClients.forEach(c => {
                html += '<div class="alert-item" style="padding-left:16px;">' + c.name + ' — ' + c.flagged_domains + '/' + c.total_domains + ' domains flagged (health score: ' + c.health_score + ')</div>';
            });
        }
        if (d.smtp_failures > 0) html += '<div class="alert-item">' + d.smtp_failures + ' accounts with SMTP failures</div>';
        if (d.imap_failures > 0) html += '<div class="alert-item">' + d.imap_failures + ' accounts with IMAP failures</div>';
        const grouped = {};
        d.blocked_accounts.forEach(b => {
            const short = b.reason.split(':')[0] || 'Unknown';
            if (!grouped[short]) grouped[short] = [];
            grouped[short].push(b.email.split('@')[1]);
        });
        for (const [reason, domains] of Object.entries(grouped)) {
            const unique = [...new Set(domains)];
            html += '<div class="alert-item">' + unique.length + ' domain(s) blocked — ' + reason + ': ' + unique.join(', ') + '</div>';
        }
        html += '</div>';
        alertEl.innerHTML = html;
    } else {
        alertEl.innerHTML = '';
    }

    // Summary stats
    const summaryEl = document.getElementById('summary-row');
    // Compute overall avg bounce/reply from all clients
    const allBounce = d.clients.filter(c => c.avg_bounce_rate !== null).map(c => c.avg_bounce_rate);
    const allReply = d.clients.filter(c => c.avg_reply_rate !== null).map(c => c.avg_reply_rate);
    const overallBounce = allBounce.length ? (allBounce.reduce((a,b) => a+b, 0) / allBounce.length).toFixed(1) : '—';
    const overallReply = allReply.length ? (allReply.reduce((a,b) => a+b, 0) / allReply.length).toFixed(1) : '—';
    const obColor = overallBounce !== '—' ? (parseFloat(overallBounce) > 3 ? 'alert' : parseFloat(overallBounce) > 1 ? 'warn' : 'good') : 'good';
    const orColor = overallReply !== '—' ? (parseFloat(overallReply) > 5 ? 'good' : parseFloat(overallReply) > 2 ? 'warn' : 'alert') : 'good';

    summaryEl.innerHTML = `
        <div class="stat-card good"><div class="value">${d.total_accounts}</div><div class="label">Total Accounts</div></div>
        <div class="stat-card ${d.warming > 0 ? 'warn' : 'good'}"><div class="value">${d.warming}</div><div class="label">In Warmup (14d)</div></div>
        <div class="stat-card good"><div class="value">${d.in_campaign}</div><div class="label">In Campaigns</div></div>
        <div class="stat-card ${obColor}"><div class="value">${overallBounce}${overallBounce !== '—' ? '%' : ''}</div><div class="label">Avg Bounce Rate</div></div>
        <div class="stat-card ${orColor}"><div class="value">${overallReply}${overallReply !== '—' ? '%' : ''}</div><div class="label">Avg Reply Rate</div></div>
        <div class="stat-card ${d.smtp_failures > 0 ? 'alert' : 'good'}"><div class="value">${d.smtp_failures}</div><div class="label">SMTP Failures</div></div>
    `;

    // Client cards
    const gridEl = document.getElementById('clients-grid');
    clientsList = d.clients;
    gridEl.innerHTML = d.clients.map(cl => {
        const hasAlert = cl.smtp_failures > 0 || cl.blocked > 0;
        const readyBadge = cl.days_until_ready !== null
            ? (cl.days_until_ready <= 0
                ? '<span class="badge badge-green">Ready</span>'
                : '<span class="badge badge-yellow">' + cl.days_until_ready + 'd left</span>')
            : '';
        const rotBadge = cl.days_until_rotation !== null && cl.days_until_rotation <= 7
            ? '<span class="badge badge-red">Rotate soon</span>'
            : '';

        const healthColor = cl.health_score >= 85 ? '#4ecdc4' : cl.health_score >= 60 ? '#ffd93d' : '#ff6b6b';
        const healthBg = cl.health_score >= 85 ? '#1a4a3a' : cl.health_score >= 60 ? '#4a3a1a' : '#4a1a1a';

        return `
        <div class="client-card ${hasAlert || cl.needs_attention ? 'has-alert' : ''}" onclick="openDetail(${cl.id}, '${cl.name.replace(/'/g, "\\'")}')">
            <div class="cc-header">
                <span class="cc-name">${cl.name}</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="badge" style="background:${healthBg};color:${healthColor};font-size:13px;padding:3px 10px;">${cl.health_score}</span>
                    <span class="cc-count">${cl.accounts} accounts</span>
                </div>
            </div>
            ${cl.needs_attention ? '<div style="background:#4a1a1a;border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:#ff6b6b;">' + cl.flagged_domains + '/' + cl.total_domains + ' domains flagged (' + cl.flagged_pct + '%)</div>' : ''}
            <div class="cc-stats">
                <div class="cc-stat"><span class="label">${cl.warming > 0 ? 'Warming Up' : 'Active'}</span><span>${cl.warming > 0 ? cl.warming : cl.accounts}</span></div>
                <div class="cc-stat"><span class="label">In Campaign</span><span>${cl.in_campaign}</span></div>
                <div class="cc-stat"><span class="label">SMTP Fail</span><span style="color:${cl.smtp_failures > 0 ? '#ff6b6b' : '#4ecdc4'}">${cl.smtp_failures}</span></div>
                <div class="cc-stat"><span class="label">Blocked</span><span style="color:${cl.blocked > 0 ? '#ff6b6b' : '#4ecdc4'}">${cl.blocked}</span></div>
                <div class="cc-stat"><span class="label">Bounce Rate</span><span style="color:${cl.avg_bounce_rate !== null ? (cl.avg_bounce_rate > 3 ? '#ff6b6b' : cl.avg_bounce_rate > 1 ? '#ffd93d' : '#4ecdc4') : '#888'}">${cl.avg_bounce_rate !== null ? cl.avg_bounce_rate + '%' : '—'}</span></div>
                <div class="cc-stat"><span class="label">Reply Rate</span><span style="color:${cl.avg_reply_rate !== null ? (cl.avg_reply_rate > 5 ? '#4ecdc4' : cl.avg_reply_rate > 2 ? '#ffd93d' : '#ff6b6b') : '#888'}">${cl.avg_reply_rate !== null ? cl.avg_reply_rate + '%' : '—'}</span></div>
            </div>
            ${cl.warming > 0 && cl.warmup_days_done !== null ? '<div style="margin-top:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px;"><span>Warmup Progress</span><span>' + cl.warmup_progress + '</span></div><div style="background:#0a1628;border-radius:4px;height:6px;overflow:hidden;"><div style="background:#7c4dff;height:100%;width:' + Math.round(cl.warmup_days_done / 14 * 100) + '%;border-radius:4px;"></div></div></div>' : ''}
            <div class="cc-dates">
                ${cl.warmup_start ? '<div class="date-row"><span>Warmup Start</span><span>' + cl.warmup_start + '</span></div>' : ''}
                ${cl.ready_date ? '<div class="date-row"><span>Ready Date</span><span>' + cl.ready_date + ' ' + readyBadge + '</span></div>' : ''}
                ${cl.rotation_date ? '<div class="date-row"><span>Rotation Date</span><span>' + cl.rotation_date + ' ' + rotBadge + '</span></div>' : ''}
            </div>
        </div>`;
    }).join('');

    // Populate assign dropdown
    const select = document.getElementById('assign-client-select');
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- Assign to client --</option>';
    d.clients.forEach(cl => {
        select.innerHTML += `<option value="${cl.id}">${cl.name}</option>`;
    });
    select.value = currentVal;
}

async function openDetail(clientId, clientName) {
    document.getElementById('detail-overlay').style.display = 'block';
    document.getElementById('detail-panel').style.display = 'block';
    document.getElementById('detail-title').textContent = clientName;
    document.getElementById('detail-content').innerHTML = '<div class="loading"><span class="spinner"></span> Loading accounts...</div>';

    try {
        const resp = await fetch('/api/client/' + clientId + '/accounts');
        const data = await resp.json();
        renderDetailTable(data);
    } catch (err) {
        document.getElementById('detail-content').innerHTML = 'Error: ' + err.message;
    }
}

function renderDetailTable(data) {
    const accounts = data.accounts;

    // Replacement recommendation
    let recHtml = '';
    if (data.flagged_domains && data.flagged_domains.length > 0) {
        recHtml = `<div style="background:#4a1a1a;border:1px solid #8b3a3a;border-radius:8px;padding:14px 18px;margin-bottom:16px;">
            <div style="font-size:14px;color:#ff6b6b;font-weight:600;margin-bottom:6px;">Infrastructure Replacement Needed</div>

            <div style="font-size:13px;color:#ffaaaa;margin-bottom:10px;">Recommended: Set up ${data.replacement_domains_needed} new domain(s) (${data.replacement_inboxes} inboxes).</div>
            <div style="font-size:12px;color:#888;margin-bottom:10px;">Flagged domains: ${data.flagged_domains.join(', ')}</div>
            <button onclick="triggerReplacement('${data.client_id}', ${JSON.stringify(data.flagged_domains).replace(/'/g, "\\'")})" style="background:#7c4dff;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;">Start Replacement</button>
            <span id="replacement-status-${data.client_id}" style="margin-left:12px;font-size:13px;"></span>
        </div>`;
    }

    let html = recHtml;
    html += '<table style="width:100%; border-collapse:collapse; font-size:13px;">';
    html += '<thead><tr><th>Email</th><th>Health</th><th>Warmup</th><th>Rep</th><th>Bounce</th><th>Reply</th><th>Sent</th><th>Campaigns</th><th>SMTP</th></tr></thead><tbody>';

    accounts.forEach(a => {
        const statusColor = a.warmup_status === 'ACTIVE' ? '#4ecdc4' : (a.blocked_reason ? '#ff6b6b' : '#ffd93d');
        const br = a.bounce_rate !== null ? parseFloat(a.bounce_rate) : null;
        const rr = a.reply_rate !== null ? parseFloat(a.reply_rate) : null;
        const brColor = br !== null ? (br > 3 ? '#ff6b6b' : br > 1 ? '#ffd93d' : '#4ecdc4') : '#888';
        const rrColor = rr !== null ? (rr > 5 ? '#4ecdc4' : rr > 2 ? '#ffd93d' : '#ff6b6b') : '#888';

        const healthColor = a.health_score >= 85 ? '#4ecdc4' : a.health_score >= 60 ? '#ffd93d' : '#ff6b6b';
        const healthBg = a.health_score >= 85 ? '#1a4a3a' : a.health_score >= 60 ? '#4a3a1a' : '#4a1a1a';
        const rowBg = a.domain_flagged ? 'background:#2a1a1a;' : '';

        // Flag icons
        const flagIcons = (a.health_flags || []).map(f => {
            const icons = {bounce:'B',reply:'R',reputation:'REP',placement:'P',smtp:'SMTP',blocked:'BLK',warmup_off:'WU'};
            return '<span style="background:#4a1a1a;color:#ff6b6b;padding:1px 4px;border-radius:3px;font-size:10px;margin-left:2px;" title="' + f + '">' + (icons[f]||f) + '</span>';
        }).join('');

        // Warmup cell with progress bar for new accounts
        let warmupCell = `<span style="color:${statusColor}">${a.warmup_status}</span>`;
        if (a.warmup_status === 'ACTIVE' && a.warmup_days !== null && a.warmup_days < 14) {
            const pct = Math.min(100, Math.round(a.warmup_days / 14 * 100));
            warmupCell += `<div style="margin-top:4px;background:#0a1628;border-radius:3px;height:4px;width:80px;"><div style="background:#7c4dff;height:100%;width:${pct}%;border-radius:3px;"></div></div><div style="font-size:10px;color:#888;margin-top:2px;">${a.warmup_days}d / 14d</div>`;
        }
        if (a.blocked_reason) {
            warmupCell += `<br><small style="color:#ff6b6b">${a.blocked_reason}</small>`;
        }

        html += `<tr style="${rowBg}">
            <td>${a.email}</td>
            <td><span style="background:${healthBg};color:${healthColor};padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;">${a.health_score}</span>${flagIcons}</td>
            <td>${warmupCell}</td>
            <td>${a.warmup_reputation}</td>
            <td style="color:${brColor}">${br !== null ? br.toFixed(1) + '%' : '—'}</td>
            <td style="color:${rrColor}">${rr !== null ? rr.toFixed(1) + '%' : '—'}</td>
            <td>${a.health_sent || a.warmup_sent}</td>
            <td>${a.campaign_count}</td>
            <td style="color:${a.smtp_ok ? '#4ecdc4' : '#ff6b6b'}">${a.smtp_ok ? 'OK' : 'FAIL'}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('detail-content').innerHTML = html;
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');

                            <td>${dm.domain}</td>
                            <td>${dm.mailbox_count}</td>
                            <td>${dm.created}</td>
                            <td>${dm.next_renewal || '?'} ${renewBadge}</td>
                            <td style="color:${dm.status === 'ACTIVE' ? '#4ecdc4' : '#ff6b6b'}">${dm.status}</td>

                    }).join('')}

function toggleZmSelectAll(cardId, checked) {
    document.querySelectorAll('.zm-check-' + cardId).forEach(cb => cb.checked = checked);
    updateZmCancelBtn(cardId);
}

function updateZmCancelBtn(cardId) {
    const selected = document.querySelectorAll('.zm-check-' + cardId + ':checked').length;
    const btn = document.getElementById('cancel-btn-' + cardId);
    if (btn) btn.disabled = selected === 0;
}

async function cancelSelectedDomains(cardId) {
    const domainIds = Array.from(document.querySelectorAll('.zm-check-' + cardId + ':checked')).map(cb => cb.value);
    if (!domainIds.length) return;

    if (!confirm('Cancel ' + domainIds.length + ' domain(s) from ZapMail? This stops billing but domains stay on Spaceship.')) return;

    const btn = document.getElementById('cancel-btn-' + cardId);
    const status = document.getElementById('cancel-status-' + cardId);
    btn.disabled = true;
    status.textContent = 'Cancelling...';

    try {
        const resp = await fetch('/api/zapmail/cancel', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({domain_ids: domainIds})
        });
        const result = await resp.json();
        if (result.error) {
            status.textContent = 'Error: ' + result.error.substring(0, 100);
        } else {
            status.textContent = 'Cancelled! Refreshing...';
            zmData = null;
            setTimeout(loadZapmail, 1500);
        }
    } catch (err) {
        status.textContent = 'Error: ' + err.message;
    }
}

let domData = null;

async function loadDomains() {

function renderDomains() {
    const d = domData;

    document.getElementById('dom-summary-row').innerHTML = `

    // Alerts

        d.alerts.forEach(a => {
            alertHtml += `<div class="alert-item">${a.domain} (${a.registrar}) — expires ${a.expires}, ${a.days_until_expiry} days left, auto-renew OFF</div>`;
        });
        alertHtml += '</div>';
        document.getElementById('dom-alerts').innerHTML = alertHtml;
    } else {
        document.getElementById('dom-alerts').innerHTML = '';
    }

    // Domain tables by registrar
    let html = '';
    for (const [registrar, domains] of Object.entries(d.by_registrar)) {
        html += `<h2 class="section-title">${registrar} (${domains.length} domains)</h2>`;
        html += '<table class="zm-domain-table"><thead><tr><th>Domain</th><th>Status</th><th>Expires</th><th>Days Left</th><th>Auto-Renew</th></tr></thead><tbody>';
        domains.forEach(dm => {
            const daysLeft = dm.days_until_expiry;
            const daysColor = daysLeft === null ? '#888' : (daysLeft <= 7 ? '#ff6b6b' : (daysLeft <= 30 ? '#ffd93d' : '#4ecdc4'));
            const renewColor = dm.auto_renew ? '#4ecdc4' : '#ffd93d';
            const canToggle = dm.registrar === 'porkbun';
            const toggleBtn = canToggle
                ? `<button onclick="toggleAutoRenew('${dm.domain}','${dm.registrar}',${!dm.auto_renew},this)" style="background:none;border:1px solid ${renewColor};color:${renewColor};padding:2px 8px;border-radius:4px;cursor:pointer;font-size:12px;">${dm.auto_renew ? 'ON' : 'OFF'}</button>`
                : `<span style="color:${renewColor}" title="${dm.registrar} doesn't support API toggle">${dm.auto_renew ? 'ON' : 'OFF'}</span>`;
            html += `<tr>
                <td>${dm.domain}</td>
                <td style="color:${dm.status === 'ACTIVE' || dm.status === 'registered' ? '#4ecdc4' : '#ffd93d'}">${dm.status}</td>
                <td>${dm.expires || '?'}</td>
                <td style="color:${daysColor}">${daysLeft !== null ? daysLeft + 'd' : '?'}</td>
                <td>${toggleBtn}</td>
            </tr>`;
        });
        html += '</tbody></table>';
    }
    document.getElementById('dom-content').innerHTML = html;
}

async function toggleAutoRenew(domain, registrar, enabled, btn) {
    const action = enabled ? 'enable' : 'disable';
    if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} auto-renew for ${domain}?`)) return;

    btn.disabled = true;
    btn.textContent = '...';
    try {
        const resp = await fetch('/api/domains/auto-renew', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({domain, registrar, enabled})
        });
        const result = await resp.json();
        if (result.success) {
            btn.textContent = enabled ? 'ON' : 'OFF';
            btn.style.color = enabled ? '#4ecdc4' : '#ffd93d';
            btn.style.borderColor = enabled ? '#4ecdc4' : '#ffd93d';
            btn.disabled = false;
            btn.onclick = () => toggleAutoRenew(domain, registrar, !enabled, btn);
        } else {
            alert('Failed: ' + result.message);
            btn.textContent = enabled ? 'OFF' : 'ON';
            btn.disabled = false;
        }
    } catch (err) {
        alert('Error: ' + err.message);
        btn.textContent = enabled ? 'OFF' : 'ON';
        btn.disabled = false;
    }
}

        });
        if (d.smartlead_only_count > 20) html += `<div class="sync-item" style="color:#888">...and ${d.smartlead_only_count - 20} more</div>`;

    if (d.mismatches.length === 0 && d.zapmail_only_count === 0 && d.smartlead_only_count === 0) {

function renderPipelines() {
    const pipelines = pipelineData.pipelines || [];

    const active = pipelines.filter(p => p.status === 'running' || p.status === 'awaiting_removal');
    const badge = document.getElementById('pipeline-badge');
    if (active.length > 0) {
        badge.style.display = 'inline';
        badge.textContent = active.length + ' active';
    } else {
        badge.style.display = 'none';
    }

    if (pipelines.length === 0) {
        document.getElementById('pipelines-content').innerHTML = '<div style="text-align:center;color:#888;padding:40px;">No pipelines yet. Start one from the SmartLead tab.</div>';
        return;
    }

    const stepLabels = {
        claim_domains: 'Claim Domains',
        set_dns: 'Set DNS',
        connect_zapmail: 'Connect ZapMail',
        create_mailboxes: 'Create Mailboxes',
        upload_photos: 'Upload Photos',
        tag_and_configure: 'Tag & Configure',
        export_to_smartlead: 'Export to SmartLead',
        enable_warmup: 'Enable Warmup',
        smartlead_tags: 'SmartLead Tags',
        export_csv: 'Export CSV',
        gcal_rotation: 'Schedule Rotation',
        wait_for_warmup: 'Waiting for Warmup',
        check_campaigns: 'Check Campaigns',
        remove_old: 'Remove Old Inboxes',
        cleanup: 'Cleanup',
    };

    let html = '';
    pipelines.forEach(p => {
        const statusColor = p.status === 'complete' ? '#4ecdc4' : p.status === 'error' ? '#ff6b6b' : p.status === 'awaiting_removal' ? '#ffd93d' : '#7c4dff';
        const statusLabel = p.status === 'awaiting_removal' ? 'Awaiting Removal' : p.status.charAt(0).toUpperCase() + p.status.slice(1);

        html += `<div style="background:#16213e;border:1px solid #0f3460;border-radius:10px;padding:16px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <div>
                    <span style="font-size:16px;font-weight:600;">${p.client_name}</span>
                    <span style="font-size:13px;color:#888;margin-left:12px;">${p.type === 'new_setup' ? 'New Setup' : 'Replacement'}</span>
                </div>
                <span style="color:${statusColor};font-weight:500;">${statusLabel}</span>
            </div>
            <div style="font-size:13px;color:#888;margin-bottom:8px;">Domains: ${p.domains.join(', ')}</div>
            <div style="font-size:12px;color:#888;">Started: ${new Date(p.created_at).toLocaleString()}</div>`;

        if (p.status !== 'complete') {
            const allSteps = p.type === 'new_setup'
                ? ['claim_domains','set_dns','connect_zapmail','create_mailboxes','upload_photos','tag_and_configure','export_to_smartlead','enable_warmup','smartlead_tags','export_csv','gcal_rotation']
                : ['claim_domains','set_dns','connect_zapmail','create_mailboxes','upload_photos','tag_and_configure','export_to_smartlead','enable_warmup','smartlead_tags','wait_for_warmup','check_campaigns','remove_old','cleanup','export_csv','gcal_rotation'];
            const currentIdx = allSteps.indexOf(p.current_step);
            html += '<div style="display:flex;gap:4px;margin-top:12px;flex-wrap:wrap;">';
            allSteps.forEach((s, i) => {
                const color = i < currentIdx ? '#4ecdc4' : i === currentIdx ? '#7c4dff' : '#333';
                const label = stepLabels[s] || s;
                html += `<div style="background:${color};padding:4px 10px;border-radius:4px;font-size:11px;color:${i <= currentIdx ? '#fff' : '#666'};" title="${label}">${label}</div>`;
            });
            html += '</div>';
        }

        if (p.status === 'awaiting_removal' && p.pending_removals) {
            html += '<div style="background:#4a1a1a;border:1px solid #8b3a3a;border-radius:8px;padding:12px;margin-top:12px;">';
            html += '<div style="color:#ff6b6b;font-weight:600;margin-bottom:8px;">Inboxes need removal from campaigns</div>';
            for (const [email, camps] of Object.entries(p.pending_removals)) {
                html += `<div style="margin-bottom:8px;">
                    <div style="font-size:13px;color:#ffaaaa;">${email} is in ${camps.length} campaign(s):</div>`;
                camps.forEach(c => {
                    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 4px 16px;font-size:12px;">
                        <span style="color:#888;">${c.campaign_name}</span>
                        <button onclick="removeFromCampaign('${email}',${c.campaign_id})" style="background:#5c1a1a;color:#ff6b6b;border:1px solid #8b3a3a;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px;">Remove</button>
                    </div>`;
                });
                html += `<button onclick="removeFromAllCampaigns('${email}')" style="background:#5c1a1a;color:#ff6b6b;border:1px solid #8b3a3a;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-top:4px;">Remove from all campaigns</button>`;
                html += '</div>';
            }
            html += '</div>';
        }

        if (p.errors && p.errors.length > 0) {
            html += '<div style="margin-top:8px;font-size:12px;color:#ff6b6b;">';
            p.errors.forEach(e => { html += '<div>' + e + '</div>'; });
            html += '</div>';
        }

        html += '</div>';
    });

    document.getElementById('pipelines-content').innerHTML = html;
}

async function removeFromCampaign(email, campaignId) {
    if (!confirm('Remove ' + email + ' from this campaign?')) return;
    try {
        await fetch('/api/inbox/remove-from-campaign', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, campaign_id: campaignId})
        });
        loadPipelines();
    } catch(e) { alert('Error: ' + e.message); }
}

async function removeFromAllCampaigns(email) {
    if (!confirm('Remove ' + email + ' from ALL active campaigns?')) return;
    try {
        await fetch('/api/inbox/remove-from-all-campaigns', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });
        loadPipelines();
    } catch(e) { alert('Error: ' + e.message); }
}

// --- Replacement Trigger ---
async function triggerReplacement(clientId, flaggedDomains) {
    const statusEl = document.getElementById('replacement-status-' + clientId);
    statusEl.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Starting...';

    const client = overviewData.clients.find(c => c.id === parseInt(clientId));
    if (!client) { statusEl.textContent = 'Client not found'; return; }

    try {
        const resp = await fetch('/api/pipeline/replacement', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                client_name: client.name,
                old_domain: flaggedDomains[0],
                old_emails: [],
                old_account_ids: [],
            })
        });
        const result = await resp.json();
        if (result.error) {
            statusEl.innerHTML = '<span style="color:#ff6b6b;">' + result.error + '</span>';
        } else {
            statusEl.innerHTML = '<span style="color:#4ecdc4;">Pipeline started!</span>';
        }
    } catch(err) {
        statusEl.innerHTML = '<span style="color:#ff6b6b;">Error: ' + err.message + '</span>';
    }
}

// Initial load
loadOverview();
loadWallet();

// Auto-refresh every 5 minutes
setInterval(loadOverview, 5 * 60 * 1000);
setInterval(loadWallet, 5 * 60 * 1000);
</script>
