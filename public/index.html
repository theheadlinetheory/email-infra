}

function drawProjectionChart(camp, totalAccts) {
    var el = document.getElementById('camp-projection-chart');
    if (!el) return;

    var capacity = totalAccts * 15;
    var recentRate = Math.max(camp.today_sent || 0, camp.yesterday_sent || 0);
    if (recentRate < 1) recentRate = capacity;
    var seqSteps = 4;
    var newLeadsPerDay = recentRate / seqSteps;

    var remaining = camp.remaining || 0;
    var points = [];
    var today = new Date();
    for (var day = 0; day <= 60; day++) {
        var d = new Date(today);
        d.setDate(d.getDate() + day);
        var dateStr = (d.getMonth() + 1) + '/' + d.getDate();

        var sends;
        if (isWeekend(d)) {
            sends = 0;
        } else if (remaining <= 0) {
            sends = 0;
        } else if (remaining < newLeadsPerDay) {
            sends = Math.round(remaining * seqSteps * 0.5);
            remaining = 0;
        } else {
            sends = Math.min(recentRate, remaining * seqSteps, capacity);
            remaining -= newLeadsPerDay;
        }

        points.push({ date: dateStr, sends: Math.round(sends), day: day });
        if (sends < 1 && day > 3 && !isWeekend(d)) break;
    }

    if (!points.length) { el.innerHTML = '<div class="chart-empty">No projection data.</div>'; return; }

    var w = el.offsetWidth || 700;
    var ht = 240;
    var pad = { top: 20, right: 20, bottom: 32, left: 52 };
    var cw = w - pad.left - pad.right;
    var ch = ht - pad.top - pad.bottom;

    var maxVal = capacity * 1.15;
    for (var i = 0; i < points.length; i++) { if (points[i].sends > maxVal) maxVal = points[i].sends * 1.15; }
    var n = points.length;

    function xPos(idx) { return pad.left + (n > 1 ? (idx / (n - 1)) * cw : cw / 2); }
    function yPos(val) { return pad.top + ch - (val / maxVal) * ch; }

    var svg = '<svg width="' + w + '" height="' + ht + '" style="display:block;" xmlns="http://www.w3.org/2000/svg">';

    var nGrid = 5;
    for (var i = 0; i <= nGrid; i++) {
        var gv = Math.round((maxVal / nGrid) * i);
        var gy = yPos(gv);
        svg += '<line x1="' + pad.left + '" y1="' + gy + '" x2="' + (w - pad.right) + '" y2="' + gy + '" stroke="#1e293b" stroke-width="1"/>';
        svg += '<text x="' + (pad.left - 8) + '" y="' + (gy + 3) + '" fill="#475569" font-size="10" font-family="system-ui" text-anchor="end">' + gv.toLocaleString() + '</text>';
    }

    var labelStep = Math.max(1, Math.floor(n / 8));
    for (var i = 0; i < n; i++) {
        if (i % labelStep === 0 || i === n - 1) {
            svg += '<text x="' + xPos(i) + '" y="' + (ht - 6) + '" fill="#475569" font-size="10" font-family="system-ui" text-anchor="middle">' + points[i].date + '</text>';
        }
    }

    var capY = yPos(capacity);
    svg += '<line x1="' + pad.left + '" y1="' + capY + '" x2="' + (w - pad.right) + '" y2="' + capY + '" stroke="#22c55e" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>';
    svg += '<text x="' + (w - pad.right - 4) + '" y="' + (capY - 6) + '" fill="#22c55e" font-size="10" font-family="system-ui" text-anchor="end" opacity="0.7">' + capacity.toLocaleString() + '/day</text>';

    if (n >= 2) {
        var areaPath = 'M' + xPos(0) + ',' + yPos(0);
        for (var i = 0; i < n; i++) areaPath += ' L' + xPos(i) + ',' + yPos(points[i].sends);
        areaPath += ' L' + xPos(n - 1) + ',' + yPos(0) + ' Z';
        svg += '<path d="' + areaPath + '" fill="#3b82f6" opacity="0.15"/>';

        var linePath = 'M' + xPos(0) + ',' + yPos(points[0].sends);
        for (var i = 1; i < n; i++) linePath += ' L' + xPos(i) + ',' + yPos(points[i].sends);
        svg += '<path d="' + linePath + '" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    }

    for (var i = 0; i < n; i++) {
        if (i % labelStep === 0 || i === 0 || i === n - 1 || (i > 0 && points[i].sends < points[i - 1].sends * 0.8)) {
            svg += '<circle cx="' + xPos(i) + '" cy="' + yPos(points[i].sends) + '" r="3.5" fill="#0f1117" stroke="#3b82f6" stroke-width="2"/>';
        }
    }

    var colW = n > 1 ? cw / (n - 1) : cw;
    for (var i = 0; i < n; i++) {
        var cx = xPos(i);
        var rx = n > 1 ? cx - colW / 2 : pad.left;
        var rw = n > 1 ? colW : cw;
        svg += '<rect x="' + rx + '" y="' + pad.top + '" width="' + rw + '" height="' + ch + '" fill="transparent" data-i="' + i + '" style="cursor:crosshair"/>';
        svg += '<line x1="' + cx + '" y1="' + pad.top + '" x2="' + cx + '" y2="' + (pad.top + ch) + '" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" class="hover-line" data-i="' + i + '" style="opacity:0"/>';
    }

    svg += '</svg>';
    el.innerHTML = svg;
    el._projPoints = points;

    var rects = el.querySelectorAll('rect[data-i]');
    for (var i = 0; i < rects.length; i++) {
        rects[i].addEventListener('mouseenter', projHoverIn);
        rects[i].addEventListener('mousemove', chartHoverMove);
        rects[i].addEventListener('mouseleave', projHoverOut);
    }
}

function projHoverIn(e) {
    var idx = parseInt(e.target.getAttribute('data-i'));
    var el = document.getElementById('camp-projection-chart');
    var pts = el ? el._projPoints : null;
    if (!pts || !pts[idx]) return;
    var lines = el.querySelectorAll('.hover-line[data-i="' + idx + '"]');
    for (var i = 0; i < lines.length; i++) lines[i].style.opacity = '1';
    var p = pts[idx];
    var tt = document.getElementById('chart-tooltip');
    var dayLabel = p.day === 0 ? 'Today' : p.day === 1 ? 'Tomorrow' : 'Day ' + p.day + ' (' + p.date + ')';
    tt.innerHTML = '<div class="tt-date">' + dayLabel + '</div>' +
        '<div class="tt-row"><span class="tt-dot" style="background:#3b82f6"></span><span style="color:#94a3b8">Predicted</span><span class="tt-val" style="color:#3b82f6">' + p.sends.toLocaleString() + ' emails</span></div>';
    tt.style.display = 'block';
}

function projHoverOut(e) {
    var idx = parseInt(e.target.getAttribute('data-i'));
    var el = document.getElementById('camp-projection-chart');
    if (el) {
        var lines = el.querySelectorAll('.hover-line[data-i="' + idx + '"]');
        for (var i = 0; i < lines.length; i++) lines[i].style.opacity = '0';
    }
    document.getElementById('chart-tooltip').style.display = 'none';
}

function openModal(type, idx) {
    var initGroup = (type === 'client' && cardGroups[idx]) ? cardGroups[idx] : 'a';
    modalState = { type: type, idx: idx, group: initGroup, range: '7D' };
    renderModal();
    document.getElementById('modal-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.body.style.overflow = '';
}

function renderModal() {
    var info = getModalInfo();
    var g = getModalGroup();
    if (!g) return;
    var chartKey = info.chartKey;
    if (modalState.type === 'client' && modalState.group === 'a') chartKey = info.chartKey + ' A';
    if (modalState.type === 'client' && modalState.group === 'b') chartKey = info.chartKey + ' B';

    var html = '<div class="modal-header"><div><div class="modal-name">' + esc(info.name) + '</div>' +
        '<div class="modal-meta">' + info.accounts + ' accounts</div></div>';
    if (info.badge) html += '<span class="acq-badge ' + (info.badgeClass || '') + '" style="font-size:13px;padding:4px 12px;' + (info.badgeStyle || '') + '">' + info.badge + '</span>';
    html += '</div>';

    if (info.hasB) {
        html += '<div class="group-toggle">' +
            '<button class="group-btn' + (modalState.group === 'a' ? ' active' : '') + '" onclick="modalToggle(\'a\')">Group A · ' + info.aCount + '</button>' +
            '<button class="group-btn' + (modalState.group === 'b' ? ' active' : '') + '" onclick="modalToggle(\'b\')">Group B · ' + info.bCount + '</button>' +
        '</div>';
    }

    if (modalState.type === 'generic') {
        html += '<div id="assign-client-section" style="background:#1e293b;border-radius:8px;padding:16px;margin-bottom:16px;">';
        html += '<div style="font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:10px;">Assign to Client</div>';
        html += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
        html += '<select id="assign-client-name" style="padding:8px 12px;font-size:13px;border-radius:6px;border:1px solid #334155;background:#0f1117;color:#e2e8f0;width:280px;">';
        html += '<option value="">Loading clients...</option></select>';
        html += '<select id="assign-client-ab" style="padding:8px 12px;font-size:13px;border-radius:6px;border:1px solid #334155;background:#0f1117;color:#e2e8f0;">';
        html += '<option value="A">Group A</option><option value="B">Group B</option></select>';
        html += '<button onclick="_assignGenericToClient()" id="assign-client-btn" style="padding:8px 16px;font-size:13px;border-radius:6px;border:none;background:#22c55e;color:#fff;font-weight:600;cursor:pointer;">Assign</button>';
        html += '</div>';
        html += '<div id="assign-client-status" style="margin-top:8px;font-size:12px;color:#64748b;"></div>';
        html += '</div>';
    }

    html += statsHtml(g);
    html += chartSection(chartKey);
    html += campaignHtml(g);
    html += domainBreakdown(g);
    html += accountTable(g);

    document.getElementById('modal-body').innerHTML = html;
    renderChart(chartKey, modalState.range);
    if (modalState.type === 'generic') _loadClientDropdown();
}

function _loadClientDropdown() {
    var sel = document.getElementById('assign-client-name');
    if (!sel) return;
    fetch('/api/crm-clients' + _authQs(), { headers: _authHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            var names = {};
            (res.clients || []).forEach(function(n) { names[n] = 1; });
            (data.clients || []).forEach(function(c) { if (c.name) names[c.name] = 1; });
            (data.crm_clients || []).forEach(function(n) { if (n) names[n] = 1; });
            var sorted = Object.keys(names).sort();
            var opts = '<option value="">Select client...</option>';
            for (var i = 0; i < sorted.length; i++) {
                opts += '<option value="' + esc(sorted[i]) + '">' + esc(sorted[i]) + '</option>';
            }
            sel.innerHTML = opts;
        });
}

function modalToggle(group) {
    modalState.group = group;
    renderModal();
}

function _assignGenericToClient() {
    var clientName = (document.getElementById('assign-client-name').value || '').trim();
    var ab = document.getElementById('assign-client-ab').value;
    var groupName = getModalInfo().name;
    var statusEl = document.getElementById('assign-client-status');
    var btn = document.getElementById('assign-client-btn');
    if (!clientName) { statusEl.innerHTML = '<span style="color:#ef4444;">Enter a client name</span>'; return; }
    var tagName = clientName + ' ' + ab;
    if (!confirm('This will re-tag all accounts in "' + groupName + '" to "' + tagName + '".\n\nThis cannot be undone. Continue?')) return;
    btn.disabled = true;
    btn.textContent = 'Assigning...';
    statusEl.innerHTML = '<span style="color:#3b82f6;">Re-tagging accounts — this may take a minute...</span>';
    fetch('/api/assign-generic-to-client' + _authQs(), {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, _authHeaders()),
        body: JSON.stringify({ group_name: groupName, client_name: clientName, ab: ab })
    }).then(function(r) { return r.json(); }).then(function(res) {
        btn.disabled = false;
        btn.textContent = 'Assign';
        if (res.error) {
            statusEl.innerHTML = '<span style="color:#ef4444;">Error: ' + esc(res.error) + '</span>';
            return;
        }
        var vColor = res.verified === res.total ? '#22c55e' : '#f59e0b';
        var vMsg = 'Verified: ' + res.verified + '/' + res.total + ' accounts confirmed as "' + esc(res.new_tag) + '"';
        if (res.missing > 0) vMsg += ' (' + res.missing + ' failed — retry or check SmartLead)';
        statusEl.innerHTML = '<span style="color:' + vColor + ';">' + vMsg + '</span>';
        setTimeout(async function() {
            closeModal();
            await _reloadDashboardData();
            render();
        }, 1500);
    }).catch(function(e) {
        btn.disabled = false;
        btn.textContent = 'Assign';
        statusEl.innerHTML = '<span style="color:#ef4444;">Network error: ' + esc(String(e)) + '</span>';
    });
}

/* ── Chart ── */

function chartSection(groupKey) {
    var ranges = ['1D','7D','14D','30D','All'];
    var btns = '';
    for (var i = 0; i < ranges.length; i++) {
        btns += '<button class="time-btn' + (modalState.range === ranges[i] ? ' active' : '') + '" onclick="changeRange(\'' + ranges[i] + '\')">' + ranges[i] + '</button>';
    }
    return '<div class="chart-section">' +
        '<div class="chart-header"><span class="chart-title">Health Trends</span><div class="time-btns">' + btns + '</div></div>' +
        '<div id="chart-area"></div>' +
        '<div class="chart-legend"><span><span class="legend-dot" style="background:#f97316"></span>Bounce Rate</span><span><span class="legend-dot" style="background:#22c55e"></span>Reply Rate</span></div>' +
    '</div>';
}

function changeRange(range) {
    modalState.range = range;
    var info = getModalInfo();
    var chartKey = info.chartKey;
    if (modalState.type === 'client' && modalState.group === 'a') chartKey += ' A';
    if (modalState.type === 'client' && modalState.group === 'b') chartKey += ' B';
    document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.toggle('active', b.textContent === range); });
    renderChart(chartKey, range);
}

function renderChart(groupKey, range) {
    var el = document.getElementById('chart-area');
    if (!el) return;
    if (!historyData || !historyData.length) {
        el.innerHTML = '<div class="chart-empty">Syncing — chart data will appear shortly.</div>';
        return;
    }

    var now = new Date();
    var cutoff = 0;
    if (range === '1D') cutoff = 1;
    else if (range === '7D') cutoff = 7;
    else if (range === '14D') cutoff = 14;
    else if (range === '30D') cutoff = 30;

    var dataByDate = {};
    for (var i = 0; i < historyData.length; i++) {
        var h = historyData[i];
        var gd = (h.groups || {})[groupKey] || (h.groups || {})[groupKey.replace(/ [AB]$/, '')];
        if (gd) dataByDate[h.date] = { bounce: gd.bounce, reply: gd.reply };
    }

    var days = cutoff > 0 ? cutoff : Math.max(Object.keys(dataByDate).length, 14);
    var points = [];
    var lastBounce = null, lastReply = null;
    for (var d = days; d >= 0; d--) {
        var dt = new Date(now); dt.setDate(dt.getDate() - d);
        var key = dt.toISOString().slice(0, 10);
        var dd = dataByDate[key];
        if (dd) { lastBounce = dd.bounce; lastReply = dd.reply; }
        points.push({ date: key, bounce: lastBounce, reply: lastReply });
    }

    if (!points.length || (lastBounce === null && lastReply === null)) {
        el.innerHTML = '<div class="chart-empty">No data for this time range.</div>';
        return;
    }

    var w = el.offsetWidth || 700;
    var ht = 220;
    var pad = { top: 20, right: 20, bottom: 32, left: 44 };
    var cw = w - pad.left - pad.right;
    var ch = ht - pad.top - pad.bottom;

    var allVals = [];
    for (var i = 0; i < points.length; i++) {
        if (points[i].bounce != null) allVals.push(points[i].bounce);
        if (points[i].reply != null) allVals.push(points[i].reply);
    }
    var maxVal = allVals.length ? Math.max.apply(null, allVals) : 5;
    maxVal = Math.ceil(maxVal * 1.3);
    if (maxVal < 3) maxVal = 3;

    var n = points.length;
    function xPos(idx) { return pad.left + (n > 1 ? (idx / (n - 1)) * cw : cw / 2); }
    function yPos(val) { return pad.top + ch - (val / maxVal) * ch; }

    var svg = '<svg width="' + w + '" height="' + ht + '" style="display:block;" xmlns="http://www.w3.org/2000/svg">';

    // Grid lines
    var nGrid = 5;
    for (var i = 0; i <= nGrid; i++) {
        var gv = Math.round((maxVal / nGrid) * i * 10) / 10;
        var gy = yPos(gv);
        svg += '<line x1="' + pad.left + '" y1="' + gy + '" x2="' + (w - pad.right) + '" y2="' + gy + '" stroke="#1e293b" stroke-width="1"/>';
        svg += '<text x="' + (pad.left - 8) + '" y="' + (gy + 3) + '" fill="#475569" font-size="10" font-family="system-ui" text-anchor="end">' + gv + '%</text>';
    }

    // X axis labels
    var labelStep = Math.max(1, Math.floor(n / 7));
    for (var i = 0; i < n; i++) {
        var showLabel = (i % labelStep === 0) || (i === n - 1);
        if (showLabel) {
            var lbl = points[i].date.slice(5);
            svg += '<text x="' + xPos(i) + '" y="' + (ht - 6) + '" fill="#475569" font-size="10" font-family="system-ui" text-anchor="middle">' + lbl + '</text>';
        }
        // Vertical tick
        if (showLabel) svg += '<line x1="' + xPos(i) + '" y1="' + (pad.top + ch) + '" x2="' + xPos(i) + '" y2="' + (pad.top + ch + 4) + '" stroke="#2a2d38" stroke-width="1"/>';
    }

    // Area fill + line for each metric
    function drawLine(pts, key, color, fillOpacity) {
        var valid = [];
        for (var i = 0; i < pts.length; i++) {
            if (pts[i][key] != null) valid.push({ idx: i, x: xPos(i), y: yPos(pts[i][key]), val: pts[i][key] });
        }
        if (!valid.length) return '';
        var s = '';

        // Filled area
        if (valid.length >= 2) {
            var areaPath = 'M' + valid[0].x + ',' + yPos(0);
            for (var i = 0; i < valid.length; i++) areaPath += ' L' + valid[i].x + ',' + valid[i].y;
            areaPath += ' L' + valid[valid.length - 1].x + ',' + yPos(0) + ' Z';
            s += '<path d="' + areaPath + '" fill="' + color + '" opacity="' + fillOpacity + '"/>';
        }

        // Line
        if (valid.length >= 2) {
            var linePath = 'M' + valid[0].x + ',' + valid[0].y;
            for (var i = 1; i < valid.length; i++) linePath += ' L' + valid[i].x + ',' + valid[i].y;
            s += '<path d="' + linePath + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
        }

        // Dots
        for (var i = 0; i < valid.length; i++) {
            s += '<circle cx="' + valid[i].x + '" cy="' + valid[i].y + '" r="3.5" fill="#0f1117" stroke="' + color + '" stroke-width="2" class="chart-dot" data-idx="' + valid[i].idx + '"/>';
        }
        return s;
    }

    svg += drawLine(points, 'reply', '#22c55e', '0.12');
    svg += drawLine(points, 'bounce', '#f97316', '0.12');

    // Axis lines
    svg += '<line x1="' + pad.left + '" y1="' + pad.top + '" x2="' + pad.left + '" y2="' + (pad.top + ch) + '" stroke="#2a2d38" stroke-width="1"/>';
    svg += '<line x1="' + pad.left + '" y1="' + (pad.top + ch) + '" x2="' + (w - pad.right) + '" y2="' + (pad.top + ch) + '" stroke="#2a2d38" stroke-width="1"/>';

    // Invisible hover zones per date (full height, shows tooltip with both values)
    var colW = n > 1 ? cw / (n - 1) : cw;
    for (var i = 0; i < n; i++) {
        var cx = xPos(i);
        var rx = n > 1 ? cx - colW / 2 : pad.left;
        var rw = n > 1 ? colW : cw;
        svg += '<rect x="' + rx + '" y="' + pad.top + '" width="' + rw + '" height="' + ch + '" fill="transparent" data-i="' + i + '" style="cursor:crosshair"/>';
        // Hover line (hidden by default, shown via JS)
        svg += '<line x1="' + cx + '" y1="' + pad.top + '" x2="' + cx + '" y2="' + (pad.top + ch) + '" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" class="hover-line" data-i="' + i + '" style="opacity:0"/>';
    }

    svg += '</svg>';
    el.innerHTML = svg;

    // Store points for tooltip access
    el._chartPoints = points;

    // Bind hover events
    var rects = el.querySelectorAll('rect[data-i]');
    for (var i = 0; i < rects.length; i++) {
        rects[i].addEventListener('mouseenter', chartHoverIn);
        rects[i].addEventListener('mousemove', chartHoverMove);
        rects[i].addEventListener('mouseleave', chartHoverOut);
    }
}

function chartHoverIn(e) {
    var idx = parseInt(e.target.getAttribute('data-i'));
    var el = document.getElementById('chart-area');
    var pts = el ? el._chartPoints : null;
    if (!pts || !pts[idx]) return;
    // Show hover line
    var lines = el.querySelectorAll('.hover-line[data-i="' + idx + '"]');
    for (var i = 0; i < lines.length; i++) lines[i].style.opacity = '1';
    // Enlarge dots for this index
    var dots = el.querySelectorAll('.chart-dot[data-idx="' + idx + '"]');
    for (var i = 0; i < dots.length; i++) dots[i].setAttribute('r', '5');
    // Build tooltip
    var p = pts[idx];
    var tt = document.getElementById('chart-tooltip');
    tt.innerHTML = '<div class="tt-date">' + p.date + '</div>' +
        '<div class="tt-row"><span class="tt-dot" style="background:#f97316"></span><span style="color:#94a3b8">Bounce</span><span class="tt-val" style="color:#f97316">' + (p.bounce != null ? p.bounce + '%' : '—') + '</span></div>' +
        '<div class="tt-row"><span class="tt-dot" style="background:#22c55e"></span><span style="color:#94a3b8">Reply</span><span class="tt-val" style="color:#22c55e">' + (p.reply != null ? p.reply + '%' : '—') + '</span></div>';
    tt.style.display = 'block';
}

function chartHoverMove(e) {
    var tt = document.getElementById('chart-tooltip');
    if (tt.style.display !== 'block') return;
    var x = e.clientX + 16;
    var y = e.clientY - 10;
    if (x + 160 > window.innerWidth) x = e.clientX - 170;
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
}

function chartHoverOut(e) {
    var idx = parseInt(e.target.getAttribute('data-i'));
    var el = document.getElementById('chart-area');
    // Hide hover line
    var lines = el.querySelectorAll('.hover-line[data-i="' + idx + '"]');
    for (var i = 0; i < lines.length; i++) lines[i].style.opacity = '0';
    // Reset dots
    var dots = el.querySelectorAll('.chart-dot[data-idx="' + idx + '"]');
    for (var i = 0; i < dots.length; i++) dots[i].setAttribute('r', '3.5');
    document.getElementById('chart-tooltip').style.display = 'none';
}

/* ── Detail sections (used inside modal) ── */

function campaignHtml(s) {
    var camps = s.campaigns || [];
    var html = '<div class="detail-header">Campaigns (' + camps.length + ')</div>';
    if (!camps.length) return html + '<div class="campaign-none">No campaigns assigned</div>';
    for (var i = 0; i < camps.length; i++) {
        var c = camps[i];
        var dot = c.status === 'ACTIVE' ? '<span style="color:#22c55e">&#9679;</span> ' :
                  c.status === 'PAUSED' ? '<span style="color:#f59e0b">&#9679;</span> ' : '';
        html += '<div class="campaign-item"><span class="campaign-name">' + dot + esc(c.name) + '</span><span class="campaign-accts">' + c.accounts + ' inboxes</span></div>';
    }
    return html;
}

function domainBreakdown(s) {
    var accts = s.account_details || [];
    if (!accts.length) return '';
    var byDomain = {};
    for (var i = 0; i < accts.length; i++) {
        var a = accts[i];
        var d = a.domain || (a.email || '').split('@')[1] || '';
        if (!byDomain[d]) byDomain[d] = { bounces: [], replies: [], reps: [], accounts: 0, sent: 0 };
        byDomain[d].accounts++;
        byDomain[d].sent += a.sent || 0;
        if (a.bounce_rate != null) byDomain[d].bounces.push(a.bounce_rate);
        if (a.reply_rate != null) byDomain[d].replies.push(a.reply_rate);
        if (a.warmup_reputation != null) byDomain[d].reps.push(a.warmup_reputation);
    }
    var domains = Object.keys(byDomain).sort();
    if (domains.length <= 1) return '';
    var html = '<div class="detail-header">Domains (' + domains.length + ')</div>';
    html += '<div class="account-table-wrap"><table class="account-table"><thead><tr>' +
        '<th>Domain</th><th>Inboxes</th><th>Health</th><th>Sent</th><th></th>' +
    '</tr></thead><tbody>';
    for (var i = 0; i < domains.length; i++) {
        var d = domains[i];
        var info = byDomain[d];
        var dInboxes = info.accounts > 0 ? Array(info.accounts) : [];
        var idx = 0;
        for (var ai = 0; ai < accts.length; ai++) {
            var ad = accts[ai].domain || (accts[ai].email || '').split('@')[1] || '';
            if (ad === d) { dInboxes[idx++] = { sent: accts[ai].sent || 0, reply: accts[ai].reply_rate }; }
        }
        dInboxes = dInboxes.filter(function(x) { return x; });
        var dh = domainHealth(dInboxes);
        var alreadyFlagged = (data._replacements || []).some(function(j) {
            return j.old_domain === d && j.status !== 'swapped' && j.status !== 'cancelled';
        });
        var flagBtn = '';
        if (dh.cls === 'bad' && !alreadyFlagged) {
            flagBtn = '<button onclick="event.stopPropagation();flagDomain(\'' + d.replace(/'/g, "\\'") + '\',\'' + (dh.label || '').replace(/'/g, "\\'") + '\')" ' +
                'style="padding:2px 8px;font-size:10px;background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;border-radius:4px;cursor:pointer;">Flag</button>';
        } else if (alreadyFlagged) {
            flagBtn = '<span style="font-size:10px;color:#fbbf24;">Flagged</span>';
        }
        html += '<tr><td style="color:#e2e8f0">' + esc(d) + '</td>' +
            '<td>' + info.accounts + '</td>' +
            '<td style="color:' + dh.color + ';font-weight:600;">' + dh.label + '</td>' +
            '<td>' + info.sent + '</td>' +
            '<td>' + flagBtn + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
}
function flagDomain(domain, healthLabel) {
    if (!confirm('Flag ' + domain + ' (' + healthLabel + ' reply rate) for replacement?')) return;
    var info = getModalInfo();
    var g = getModalGroup();
    var groupType = modalState.type === 'acq' ? 'acquisition' : (modalState.type === 'generic' ? 'generic' : 'client');
    var campaigns = (g.campaigns || []).map(function(c) { return c.name; });
    fetch('/api/replacements' + _authQs(), {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, _authHeaders()),
        body: JSON.stringify({ old_domain: domain, group_name: info.name, group_type: groupType, bounce_rate: 0, campaigns: campaigns })
    }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) {
            data._replacements = data._replacements || [];
            data._replacements.push(d.job);
            renderModal();
            if (currentTab === 'maintenance') renderMaintenance();
        } else { alert(d.error || 'Error'); }
    });
}

function accountTable(s) {
    var accts = s.account_details || [];
    if (!accts.length) return '';
    var html = '<div class="detail-header">Accounts (' + accts.length + ')</div>';
    html += '<div class="account-table-wrap"><table class="account-table"><thead><tr>' +
        '<th>Email</th><th>Health</th><th>Sent</th><th>SMTP</th><th>Campaign</th>' +
    '</tr></thead><tbody>';
    for (var i = 0; i < accts.length; i++) {
        var a = accts[i];
        var h = acctHealth(a.sent, a.reply_rate);
        var smtp = a.smtp_ok ? '<span style="color:#22c55e">&#10003;</span>' : '<span style="color:#ef4444">&#10007;</span>';
        var camp = a.in_campaign ? '<span style="color:#22c55e">&#10003;</span>' : '<span style="color:#64748b">—</span>';
        html += '<tr><td style="color:#e2e8f0;white-space:nowrap">' + esc(a.email) + '</td>' +
            '<td style="color:' + h.color + ';font-weight:600;">' + h.label + '</td>' +
            '<td>' + (a.sent || 0) + '</td><td style="text-align:center">' + smtp + '</td><td style="text-align:center">' + camp + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
}

function statsHtml(s) {
    return '<div class="card-stats">' +
        cardStat('Capacity', (s.daily_capacity || 0) + '/day') +
        cardStat('In Campaign', s.in_campaign || 0, s.in_campaign > 0 ? 'good' : 'warn') +
        cardStat('Reply Rate', fmtRate(s.avg_reply_rate), rateClassAsc(s.avg_reply_rate, 2, 1)) +
        cardStat('Domains', s.total_domains || 0) +
        cardStat('SMTP Issues', s.smtp_failures || 0, (s.smtp_failures || 0) > 0 ? 'bad' : '') +
    '</div>';
}

/* ── Domains Tab ── */

var _domainsData = null;
var _domainsFilter = { status: 'all', pool: 'all', autoRenew: 'all', search: '' };

var _domainSelected = {};
var _domainSyncing = false;
var _domainBulkBusy = false;

function _domainToggleAll(checked) {
    var boxes = document.querySelectorAll('.domain-cb');
    boxes.forEach(function(cb) { cb.checked = checked; _domainSelected[cb.value] = checked; });
    _renderDomainActions();
}

function _domainToggleOne(domain, checked) {
    _domainSelected[domain] = checked;
    _renderDomainActions();
}

function _getSelectedDomains() {
    return Object.keys(_domainSelected).filter(function(k) { return _domainSelected[k]; });
}

function _renderDomainActions() {
    var sel = _getSelectedDomains();
    var el = document.getElementById('domains-actions');
    if (!sel.length) { el.innerHTML = ''; return; }
    var arCount = 0;
    var domains = _domainsData ? _domainsData.domains || [] : [];
    var byName = {};
    domains.forEach(function(d) { byName[d.domain] = d; });
    sel.forEach(function(s) { if (byName[s] && byName[s].auto_renew) arCount++; });
    var html = '<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:#1e293b;border-radius:8px;">';
    html += '<span style="font-size:12px;color:#e2e8f0;font-weight:600;">' + sel.length + ' selected</span>';
    html += '<button onclick="_bulkAutoRenew(false)" style="padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid #ef4444;background:#7f1d1d;color:#fca5a5;cursor:pointer;"' + (_domainBulkBusy ? ' disabled' : '') + '>Disable Auto-Renew (' + arCount + ' on)</button>';
    html += '<button onclick="_domainSelected={};renderDomainsTab()" style="padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;">Clear</button>';
    html += '</div>';
    el.innerHTML = html;
}

function _bulkAutoRenew(enabled) {
    var sel = _getSelectedDomains();
    if (!sel.length) return;
    var label = enabled ? 'enable' : 'disable';
    if (!confirm('Are you sure you want to ' + label + ' auto-renew on ' + sel.length + ' domains?')) return;
    _domainBulkBusy = true;
    _renderDomainActions();
    fetch('/api/domains/auto-renew' + _authQs(), {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, _authHeaders()),
        body: JSON.stringify({ domains: sel, enabled: enabled })
    }).then(function(r) { return r.json(); }).then(function(data) {
        _domainBulkBusy = false;
        if (data.error) { alert('Error: ' + data.error); return; }
        alert(data.succeeded + '/' + data.total + ' domains updated');
        _domainSelected = {};
        _domainsData = null;
        renderDomainsTab();
    }).catch(function(e) { _domainBulkBusy = false; alert('Error: ' + e); });
}

function _syncRegistrars() {
    if (_domainSyncing) return;
    _domainSyncing = true;
    var wrap = document.getElementById('domains-actions');
    var steps = [
        { registrar: 'porkbun', label: 'Porkbun' },
        { registrar: 'spaceship', label: 'Spaceship' }
    ];
    var results = [];

    function renderProgress(stepIdx, status) {
        var pct = Math.round(((stepIdx + (status === 'done' ? 1 : 0.5)) / steps.length) * 100);
        var html = '<div style="padding:12px 16px;background:#1e293b;border-radius:8px;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        html += '<span style="font-size:13px;font-weight:600;color:#e2e8f0;">Syncing Registrars</span>';
        html += '<span style="font-size:12px;color:#94a3b8;">' + pct + '%</span></div>';
        html += '<div style="height:6px;background:#0f1117;border-radius:3px;overflow:hidden;margin-bottom:10px;">';
        html += '<div style="height:100%;width:' + pct + '%;background:#3b82f6;border-radius:3px;transition:width 0.3s ease;"></div></div>';
        for (var i = 0; i < steps.length; i++) {
            var icon, color;
            if (i < stepIdx) { icon = '✓'; color = '#22c55e'; }
            else if (i === stepIdx && status === 'running') { icon = '○'; color = '#3b82f6'; }
            else if (i === stepIdx && status === 'done') { icon = '✓'; color = '#22c55e'; }
            else { icon = '○'; color = '#475569'; }
            var detail = results[i] ? ' — ' + results[i].fetched + ' domains, ' + results[i].updated + ' updated' : '';
            html += '<div style="font-size:12px;color:' + color + ';margin-bottom:2px;">' + icon + ' ' + steps[i].label + detail + '</div>';
        }
        html += '</div>';
        wrap.innerHTML = html;
    }

    function syncStep(idx) {
        if (idx >= steps.length) {
            _domainSyncing = false;
            _domainsData = null;
            renderDomainsTab();
            setTimeout(function() { wrap.innerHTML = ''; }, 3000);
            return;
        }
        renderProgress(idx, 'running');
        fetch('/api/domains/sync-registrar' + _authQs(), {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, _authHeaders()),
            body: JSON.stringify({ registrar: steps[idx].registrar })
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.error) {
                results[idx] = { fetched: 0, updated: 0, error: data.error };
            } else {
                results[idx] = { fetched: data.fetched, updated: data.updated };
            }
            renderProgress(idx, 'done');
            setTimeout(function() { syncStep(idx + 1); }, 300);
        }).catch(function(e) {
            results[idx] = { fetched: 0, updated: 0, error: String(e) };
            renderProgress(idx, 'done');
            setTimeout(function() { syncStep(idx + 1); }, 300);
        });
    }

    syncStep(0);
}

function renderDomainsTab() {
    if (!_domainsData) {
        document.getElementById('domains-stats').innerHTML = statBox('...', 'Loading');
        document.getElementById('domains-table-wrap').innerHTML = '<div style="color:#64748b;padding:20px;text-align:center;">Loading domain inventory...</div>';
        fetch('/api/domains/inventory' + _authQs(), { headers: _authHeaders() })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(d) {
                if (d) { _domainsData = d; renderDomainsTab(); }
                else { document.getElementById('domains-table-wrap').innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center;">Failed to load domains</div>'; }
            });
        return;
    }
    var s = _domainsData.summary;
    var arOn = (_domainsData.domains || []).filter(function(d) { return d.auto_renew; }).length;
    var noExpiry = (_domainsData.domains || []).filter(function(d) { return !d.expires_at; }).length;
    document.getElementById('domains-stats').innerHTML =
        statBox(s.total, 'Total Domains') +
        statBox(s.available, 'Available', 'good') +
        statBox(s.in_use, 'In Use') +
        statBox(arOn, 'Auto-Renew ON', arOn > 0 ? 'bad' : 'good') +
        statBox((s.by_provider || {}).spaceship || 0, 'Spaceship') +
        statBox((s.by_provider || {}).porkbun || 0, 'Porkbun');

    var f = _domainsFilter;
    var btnS = function(active) { return 'padding:6px 14px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid ' + (active ? '#22c55e' : '#334155') + ';background:' + (active ? '#064e3b' : 'transparent') + ';color:' + (active ? '#6ee7b7' : '#94a3b8') + ';margin-right:4px;'; };
    var fhtml = '<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">';
    fhtml += '<div><span style="font-size:11px;color:#64748b;font-weight:600;margin-right:8px;">STATUS</span>';
    ['all','available','in_use','do_not_use'].forEach(function(v) {
        var label = v === 'all' ? 'All' : v === 'in_use' ? 'In Use' : v === 'available' ? 'Available' : 'DNU';
        fhtml += '<button onclick="_domainsFilter.status=\'' + v + '\';renderDomainsTab()" style="' + btnS(f.status === v) + '">' + label + '</button>';
    });
    fhtml += '</div>';
    fhtml += '<div><span style="font-size:11px;color:#64748b;font-weight:600;margin-right:8px;">POOL</span>';
    ['all','client','acquisition'].forEach(function(v) {
        var label = v === 'all' ? 'All' : v.charAt(0).toUpperCase() + v.slice(1);
        fhtml += '<button onclick="_domainsFilter.pool=\'' + v + '\';renderDomainsTab()" style="' + btnS(f.pool === v) + '">' + label + '</button>';
    });
    fhtml += '</div>';
    fhtml += '<div><span style="font-size:11px;color:#64748b;font-weight:600;margin-right:8px;">AUTO-RENEW</span>';
    ['all','on','off'].forEach(function(v) {
        var label = v === 'all' ? 'All' : v === 'on' ? 'On' : 'Off';
        fhtml += '<button onclick="_domainsFilter.autoRenew=\'' + v + '\';renderDomainsTab()" style="' + btnS(f.autoRenew === v) + '">' + label + '</button>';
    });
    fhtml += '</div>';
    fhtml += '<div><input id="domain-search" type="text" placeholder="Search domains..." value="' + esc(f.search) + '" oninput="_domainsFilter.search=this.value.toLowerCase();renderDomainsTab()" style="padding:6px 12px;font-size:12px;border-radius:6px;border:1px solid #334155;background:#0f1117;color:#e2e8f0;width:200px;"></div>';
    fhtml += '<button id="sync-registrars-btn" onclick="_syncRegistrars()" style="padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid #3b82f6;background:#1e3a5f;color:#93c5fd;cursor:pointer;margin-left:auto;">' + (noExpiry > 0 ? 'Sync Registrars (' + noExpiry + ' missing)' : 'Sync Registrars') + '</button>';
    fhtml += '</div>';
    document.getElementById('domains-filters').innerHTML = fhtml;

    var domains = (_domainsData.domains || []).filter(function(d) {
        if (f.status !== 'all' && d.status !== f.status) return false;
        if (f.pool !== 'all' && d.pool !== f.pool) return false;
        if (f.autoRenew === 'on' && !d.auto_renew) return false;
        if (f.autoRenew === 'off' && d.auto_renew) return false;
        if (f.search && d.domain.indexOf(f.search) === -1 && (d.client || '').toLowerCase().indexOf(f.search) === -1) return false;
        return true;
    });

    var statusBadge = function(st) {
        var m = { available: { bg: '#064e3b', c: '#6ee7b7', l: 'AVAILABLE' }, in_use: { bg: '#1e3a5f', c: '#93c5fd', l: 'IN USE' }, cancelled: { bg: '#7f1d1d', c: '#fca5a5', l: 'CANCELLED' }, do_not_use: { bg: '#1e293b', c: '#64748b', l: 'DNU' } };
        var x = m[st] || m.do_not_use;
        return '<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:' + x.bg + ';color:' + x.c + ';font-weight:600;">' + x.l + '</span>';
    };
    var poolBadge = function(p) {
        return p === 'acquisition' ? '<span style="color:#3b82f6;font-size:11px;">ACQ</span>' : '<span style="color:#22c55e;font-size:11px;">CLIENT</span>';
    };
    var arBadge = function(on) {
        return on ? '<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#7f1d1d;color:#fca5a5;font-weight:600;">ON</span>'
                   : '<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:#064e3b;color:#6ee7b7;font-weight:600;">OFF</span>';
    };
    var expiryLabel = function(d) {
        if (!d) return '<span style="color:#64748b;">—</span>';
        var diff = Math.floor((new Date(d) - new Date()) / 86400000);
        var color = diff < 30 ? '#ef4444' : diff < 90 ? '#f59e0b' : '#94a3b8';
        return '<span style="color:' + color + ';">' + d + '</span>';
    };

    var html = '<div style="margin-bottom:8px;font-size:12px;color:#64748b;">Showing ' + domains.length + ' of ' + s.total + ' domains</div>';
    html += '<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;">';
    html += '<colgroup><col style="width:32px"><col><col style="width:80px"><col style="width:80px"><col style="width:60px"><col style="width:22%"><col style="width:90px"><col style="width:80px"></colgroup>';
    html += '<thead><tr style="border-bottom:1px solid #1e293b;color:#64748b;text-align:left;position:sticky;top:0;background:#0f1117;z-index:1;">' +
        '<th style="padding:8px 6px;"><input type="checkbox" onchange="_domainToggleAll(this.checked)" style="accent-color:#3b82f6;"></th>' +
        '<th style="padding:8px 8px;">Domain</th><th style="padding:8px 8px;">Status</th>' +
        '<th style="padding:8px 8px;">Provider</th><th style="padding:8px 8px;">Pool</th>' +
        '<th style="padding:8px 8px;">Client</th>' +
        '<th style="padding:8px 8px;">Expires</th><th style="padding:8px 8px;">Auto-Renew</th></tr></thead><tbody>';
    for (var i = 0; i < domains.length; i++) {
        var d = domains[i];
        var chk = _domainSelected[d.domain] ? ' checked' : '';
        html += '<tr style="border-bottom:1px solid #1e293b;">' +
            '<td style="padding:6px 6px;"><input type="checkbox" class="domain-cb" value="' + esc(d.domain) + '"' + chk + ' onchange="_domainToggleOne(\'' + d.domain.replace(/'/g, "\\'") + '\',this.checked)" style="accent-color:#3b82f6;"></td>' +
            '<td style="padding:6px 8px;color:#f1f5f9;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(d.domain) + '</td>' +
            '<td style="padding:6px 8px;">' + statusBadge(d.status) + '</td>' +
            '<td style="padding:6px 8px;color:#94a3b8;">' + esc(d.provider || '') + '</td>' +
            '<td style="padding:6px 8px;">' + poolBadge(d.pool) + '</td>' +
            '<td style="padding:6px 8px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(d.client || '—') + '</td>' +
            '<td style="padding:6px 8px;">' + expiryLabel(d.expires_at) + '</td>' +
            '<td style="padding:6px 8px;">' + arBadge(d.auto_renew) + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('domains-table-wrap').innerHTML = html;
    _renderDomainActions();
    var searchEl = document.getElementById('domain-search');
    if (searchEl && f.search) { searchEl.focus(); searchEl.setSelectionRange(f.search.length, f.search.length); }
}

/* ── Helpers ── */

function showTab(tab) {
    currentTab = tab;
    location.hash = tab === 'clients' ? '' : tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) {
        if (t.textContent.trim().toLowerCase() === (tab === 'clients' ? 'clients' : tab)) t.classList.add('active');
    });
    ['clients', 'acquisition', 'maintenance', 'domains'].forEach(function(id) {
        var show = tab === id;
        document.getElementById(id + '-tab').style.display = show ? (id === 'domains' ? 'flex' : 'block') : 'none';
    });
    if (tab === 'maintenance') renderMaintenance();
    if (tab === 'domains') renderDomainsTab();
}

function statBox(val, label, cls) { return '<div class="stat-box"><div class="stat-value ' + (cls || '') + '">' + val + '</div><div class="stat-label">' + label + '</div></div>'; }
function cardStat(label, value, cls) { return '<div class="card-stat"><span class="card-stat-label">' + label + '</span><span class="card-stat-value ' + (cls || '') + '">' + value + '</span></div>'; }
function fmtRate(v) { return v != null ? v + '%' : '—'; }
function rateClass(v, bad, warn) { if (v == null) return ''; return v >= bad ? 'bad' : v >= warn ? 'warn' : 'good'; }
function rateClassAsc(v, good, warn) { if (v == null) return ''; return v >= good ? 'good' : v >= warn ? '' : 'warn'; }
function acctHealth(sent, replyRate) {
    if (!sent || sent < 500) return { label: 'New', color: '#64748b', cls: '' };
    if (replyRate == null) return { label: '—', color: '#64748b', cls: '' };
    if (replyRate >= 2) return { label: replyRate + '%', color: '#22c55e', cls: 'good' };
    if (replyRate >= 1) return { label: replyRate + '%', color: '#f59e0b', cls: 'warn' };
    return { label: replyRate + '%', color: '#ef4444', cls: 'bad' };
}
function domainHealth(inboxes) {
    var worst = null;
    for (var i = 0; i < inboxes.length; i++) {
        var h = acctHealth(inboxes[i].sent, inboxes[i].reply);
        if (h.cls === 'bad') return h;
        if (h.cls === 'warn' && (!worst || worst.cls !== 'bad')) worst = h;
        if (!worst && h.cls === 'good') worst = h;
    }
    return worst || { label: 'New', color: '#64748b', cls: '' };
}
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

load();
</script>
