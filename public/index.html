<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THT Infrastructure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #1e293b; }
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { color: #22c55e; }
.header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #94a3b8; }

.tabs { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid #1e293b; }
.tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #94a3b8; background: none; border: none; }
.tab:hover { color: #e2e8f0; background: #1e293b; }
.tab.active { color: #fff; background: #22c55e; }

.stats-row { display: flex; gap: 16px; padding: 20px 24px; flex-wrap: wrap; }
.stat-box { background: #1a1d28; border-radius: 8px; padding: 16px 20px; min-width: 160px; flex: 1; }
.stat-value { font-size: 28px; font-weight: 700; color: #22c55e; }
.stat-value.warn { color: #f59e0b; }
.stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

.section-title { padding: 20px 24px 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 12px 24px; }

.client-card { background: #1a1d28; border-radius: 10px; padding: 20px; cursor: pointer; transition: border-color 0.15s; border: 1px solid #2a2d38; }
.client-card:hover { border-color: #22c55e; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-name { font-size: 16px; font-weight: 600; color: #f1f5f9; }
.card-count { font-size: 13px; color: #94a3b8; }

.group-toggle { display: flex; gap: 0; margin-bottom: 14px; border-radius: 6px; overflow: hidden; border: 1px solid #2a2d38; }
.group-btn { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; background: #0f1117; color: #94a3b8; border: none; transition: all 0.15s; }
.group-btn.active { background: #22c55e; color: #fff; }
.group-btn:not(.active):hover { background: #1e293b; color: #e2e8f0; }

.card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.card-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
.card-stat-label { color: #94a3b8; }
.card-stat-value { color: #e2e8f0; font-weight: 500; }
.card-stat-value.good { color: #22c55e; }
.card-stat-value.bad { color: #ef4444; }
.card-stat-value.warn { color: #f59e0b; }

.acq-card { background: #1a1d28; border-radius: 10px; padding: 16px 20px; border: 1px solid #2a2d38; cursor: pointer; transition: border-color 0.15s; }
.acq-card:hover { border-color: #22c55e; }
.acq-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.acq-name { font-size: 15px; font-weight: 600; }
.acq-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.acq-aidan { background: #f0fdf4; color: #166534; }
.acq-lars { background: #dbeafe; color: #1d4ed8; }

.campaign-list { margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2d38; display: none; }
.campaign-list.open { display: block; }
.campaign-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.campaign-name { color: #e2e8f0; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.campaign-accts { color: #94a3b8; margin-left: 12px; white-space: nowrap; }
.campaign-none { color: #64748b; font-size: 13px; font-style: italic; }
.expand-hint { font-size: 11px; color: #64748b; text-align: right; margin-top: 8px; }

.loading { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 16px; color: #94a3b8; }

.empty-state { padding: 40px 24px; text-align: center; color: #64748b; }
</style>
</head>
<body>
<div class="header">
    <h1><span>THT</span> Infrastructure</h1>
    <div class="header-right">
        <span id="last-updated"></span>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="showTab('clients')">Clients</button>
    <button class="tab" onclick="showTab('acquisition')">Acquisition</button>
</div>

<div id="loading" class="loading">Loading dashboard...</div>

<div id="clients-tab" style="display:none;">
    <div class="stats-row" id="client-stats"></div>
    <div class="section-title">Client Inbox Groups</div>
    <div class="cards-grid" id="clients-grid"></div>
    <div class="section-title">Generic Reserve Groups</div>
    <div class="cards-grid" id="generic-grid"></div>
</div>

<div id="acquisition-tab" style="display:none;">
    <div class="stats-row" id="acq-stats"></div>
    <div class="section-title">Acquisition Groups</div>
    <div class="cards-grid" id="acq-grid"></div>
</div>

<script>
var data = null;

function getCookie(name) {
    var m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : '';
}

async function load() {
    try {
        var pw = getCookie('dashboard_pw') || new URLSearchParams(location.search).get('pw') || '';
        var resp = await fetch('/api/overview' + (pw ? '?pw=' + pw : ''));
        if (resp.status === 401) {
            var pw2 = prompt('Dashboard password:');
            if (pw2) {
                document.cookie = 'dashboard_pw=' + pw2 + ';path=/;max-age=31536000';
                location.reload();
            }
            return;
        }
        data = await resp.json();
        if (data.loading) {
            document.getElementById('loading').textContent = 'Cache empty — run sync.py locally to populate.';
            return;
        }
        render();
    } catch (err) {
        document.getElementById('loading').textContent = 'Error: ' + err.message;
    }
}

function render() {
    document.getElementById('loading').style.display = 'none';

    var updated = data.generated_at ? new Date(data.generated_at).toLocaleTimeString() : '—';
    document.getElementById('last-updated').textContent = 'Updated: ' + updated;

    renderClients();
    renderGeneric();
    renderAcquisition();
    showTab('clients');
}

function renderClients() {
    var clients = data.clients || [];
    var totalAccounts = data.total_accounts || 0;
    var inCampaign = data.in_campaign || 0;

    document.getElementById('client-stats').innerHTML =
        statBox(clients.length, 'Active Clients') +
        statBox(totalAccounts, 'Total Accounts') +
        statBox(inCampaign, 'In Campaigns', inCampaign === 0 ? 'warn' : '') +
        statBox(data.untagged_count || 0, 'Untagged', (data.untagged_count || 0) > 0 ? 'warn' : '');

    var grid = document.getElementById('clients-grid');
    if (!clients.length) {
        grid.innerHTML = '<div class="empty-state">No client groups found. Run sync.py to populate.</div>';
        return;
    }
    grid.innerHTML = clients.map(function(c, i) { return clientCard(c, i); }).join('');
}

function clientCard(c, idx) {
    var hasB = c.group_b_count > 0;
    var s = c.group_a || c;
    return '<div class="client-card" id="card-' + idx + '" onclick="expandCard(\'card-' + idx + '\')">' +
        '<div class="card-header">' +
            '<div class="card-name">' + esc(c.name) + '</div>' +
            '<div class="card-count">' + c.accounts + ' accounts</div>' +
        '</div>' +
        (hasB ?
            '<div class="group-toggle" onclick="event.stopPropagation()">' +
                '<button class="group-btn active" onclick="toggleGroup(' + idx + ',\'a\')">Group A · ' + c.group_a_count + '</button>' +
                '<button class="group-btn" onclick="toggleGroup(' + idx + ',\'b\')">Group B · ' + c.group_b_count + '</button>' +
            '</div>' :
            '<div style="font-size:13px;color:#64748b;margin-bottom:10px;">Group A · ' + c.group_a_count + ' accounts</div>'
        ) +
        statsHtml(s) +
        campaignSection(s) +
    '</div>';
}

function statsHtml(s) {
    return '<div class="card-stats">' +
        cardStat('Capacity', (s.daily_capacity || 0) + '/day') +
        cardStat('In Campaign', s.in_campaign || 0, s.in_campaign > 0 ? 'good' : 'warn') +
        cardStat('Bounce Rate', fmtRate(s.avg_bounce_rate), rateClass(s.avg_bounce_rate, 3, 1)) +
        cardStat('Reply Rate', fmtRate(s.avg_reply_rate), rateClassAsc(s.avg_reply_rate, 5, 2)) +
        cardStat('Domains', s.total_domains || 0) +
        cardStat('SMTP Issues', s.smtp_failures || 0, (s.smtp_failures || 0) > 0 ? 'bad' : '') +
    '</div>';
}

function campaignSection(s) {
    var camps = s.campaigns || [];
    var html = '<div class="campaign-list">';
    if (!camps.length) {
        html += '<div class="campaign-none">No campaigns assigned</div>';
    } else {
        for (var i = 0; i < camps.length; i++) {
            var c = camps[i];
            var statusDot = c.status === 'ACTIVE' ? '<span style="color:#22c55e">&#9679;</span> ' :
                            c.status === 'PAUSED' ? '<span style="color:#f59e0b">&#9679;</span> ' : '';
            html += '<div class="campaign-item">' +
                '<span class="campaign-name">' + statusDot + esc(c.name) + '</span>' +
                '<span class="campaign-accts">' + c.accounts + ' inboxes</span>' +
            '</div>';
        }
    }
    html += '</div>';
    return html;
}

function expandCard(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var cl = el.querySelector('.campaign-list');
    if (cl) cl.classList.toggle('open');
}

function renderGeneric() {
    var groups = data.generic_groups || [];
    var grid = document.getElementById('generic-grid');
    if (!groups.length) {
        grid.innerHTML = '<div class="empty-state">No generic reserve groups.</div>';
        return;
    }
    grid.innerHTML = groups.map(function(g, i) {
        var camps = g.campaigns || [];
        var clientNames = {};
        for (var ci = 0; ci < camps.length; ci++) {
            var cn = camps[ci].name.replace(/\s*#\d.*/,'').replace(/\s*[-–]\s*.*/,'').replace(/\s*(campaign|cold|email|outreach|subsequence|list \d).*/i,'').trim();
            if (cn && !cn.match(/^(acquisition|acq)/i)) clientNames[cn] = (clientNames[cn] || 0) + camps[ci].accounts;
        }
        var names = Object.keys(clientNames);
        var badgeText = names.length > 2 ? names.length + ' clients' : names.length > 0 ? names.join(', ') : '';
        var id = 'gen-' + i;
        return '<div class="acq-card" id="' + id + '" onclick="expandCard(\'' + id + '\')">' +
            '<div class="acq-header">' +
                '<span class="acq-name">' + esc(g.name) + '</span>' +
                (badgeText ?
                    '<span class="acq-badge" style="background:#dbeafe;color:#1d4ed8;">' + esc(badgeText) + '</span>' :
                    '<span class="acq-badge" style="background:#fef3c7;color:#92400e;">Reserve</span>'
                ) +
            '</div>' +
            '<div class="card-stats">' +
                cardStat('Accounts', g.accounts) +
                cardStat('Domains', g.total_domains || 0) +
                cardStat('Capacity', (g.daily_capacity || 0) + '/day') +
                cardStat('In Campaign', g.in_campaign || 0, g.in_campaign > 0 ? 'warn' : 'good') +
            '</div>' +
            campaignSection(g) +
        '</div>';
    }).join('');
}

function renderAcquisition() {
    var groups = data.acquisition_groups || [];
    var total = groups.reduce(function(s, g) { return s + g.accounts; }, 0);
    var inCamp = groups.reduce(function(s, g) { return s + g.in_campaign; }, 0);

    document.getElementById('acq-stats').innerHTML =
        statBox(groups.length, 'Acquisition Groups') +
        statBox(total, 'Total Accounts') +
        statBox(inCamp, 'In Campaigns');

    var grid = document.getElementById('acq-grid');
    if (!groups.length) {
        grid.innerHTML = '<div class="empty-state">No acquisition groups found.</div>';
        return;
    }
    grid.innerHTML = groups.map(function(g, i) {
        var isLars = (g.name || '').match(/\bG\b/);
        var owner = isLars ? 'Lars' : 'Aidan';
        var ownerClass = isLars ? 'acq-lars' : 'acq-aidan';
        var id = 'acq-' + i;
        return '<div class="acq-card" id="' + id + '" onclick="expandCard(\'' + id + '\')">' +
            '<div class="acq-header">' +
                '<span class="acq-name">' + esc(g.name) + '</span>' +
                '<span class="acq-badge ' + ownerClass + '">' + owner + '</span>' +
            '</div>' +
            '<div class="card-stats">' +
                cardStat('Accounts', g.accounts) +
                cardStat('Domains', g.total_domains || 0) +
                cardStat('In Campaign', g.in_campaign || 0, g.in_campaign > 0 ? 'good' : '') +
                cardStat('Bounce Rate', fmtRate(g.avg_bounce_rate), rateClass(g.avg_bounce_rate, 3, 1)) +
            '</div>' +
            campaignSection(g) +
        '</div>';
    }).join('');
}

function toggleGroup(idx, group) {
    var card = document.getElementById('card-' + idx);
    if (!card) return;
    var btns = card.querySelectorAll('.group-btn');
    btns.forEach(function(b, i) {
        b.classList.toggle('active', (group === 'a' && i === 0) || (group === 'b' && i === 1));
    });
    var c = data.clients[idx];
    var s = (group === 'b' && c.group_b) ? c.group_b : (c.group_a || c);
    var statsEl = card.querySelector('.card-stats');
    if (statsEl) statsEl.outerHTML = statsHtml(s);
    var wasOpen = card.querySelector('.campaign-list.open');
    var campEl = card.querySelector('.campaign-list');
    if (campEl) campEl.outerHTML = campaignSection(s);
    if (wasOpen) {
        var newCl = card.querySelector('.campaign-list');
        if (newCl) newCl.classList.add('open');
    }
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) {
        if ((tab === 'clients' && t.textContent.trim() === 'Clients') ||
            (tab === 'acquisition' && t.textContent.trim() === 'Acquisition')) {
            t.classList.add('active');
        }
    });
    document.getElementById('clients-tab').style.display = tab === 'clients' ? 'block' : 'none';
    document.getElementById('acquisition-tab').style.display = tab === 'acquisition' ? 'block' : 'none';
}

function statBox(val, label, cls) {
    return '<div class="stat-box"><div class="stat-value ' + (cls || '') + '">' + val + '</div><div class="stat-label">' + label + '</div></div>';
}
function cardStat(label, value, cls) {
    return '<div class="card-stat"><span class="card-stat-label">' + label + '</span><span class="card-stat-value ' + (cls || '') + '">' + value + '</span></div>';
}
function fmtRate(v) { return v != null ? v + '%' : '—'; }
function rateClass(v, bad, warn) { if (v == null) return ''; return v >= bad ? 'bad' : v >= warn ? 'warn' : 'good'; }
function rateClassAsc(v, good, warn) { if (v == null) return ''; return v >= good ? 'good' : v >= warn ? '' : 'warn'; }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

load();
</script>
</body>
</html>
